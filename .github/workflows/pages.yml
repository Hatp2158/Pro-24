name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          AF5DF2: ${{ secrets.AF5DF2 }}
          B525C6: ${{ secrets.B525C6 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AF5DF2', '')
          bm = os.environ.get('B525C6', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- d2db70a22078d77cdf747f8b2c6fa8447adf7eba76 -->', gm)
              s2 = s2.replace('<!-- 9de3e8a5d2ade723879a2f42cb195e96ef6b21 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
